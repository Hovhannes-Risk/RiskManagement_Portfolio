name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Regenerate the synthetic dataset (deterministic, seed 42)
        run: python data_generator/generate_sportsbook_data.py

      - name: Run unit tests (incl. ground-truth recall against planted patterns)
        run: pytest tests/ -v

      - name: Smoke-run every analytical entry point
        run: |
          python Project_B_ML_Anomaly_Detection/bot_detection.py
          python Project_B_ML_Anomaly_Detection/ml_anomaly.py
          python Project_C_Automated_Reports/daily_report.py
          python Project_C_Automated_Reports/weekly_report.py
          python Project_D_AI_Risk_Analysis/analytical_pipeline/run_analysis.py
          python Project_E_Regulated_Compliance/compliance_engine.py
